<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>视觉参数调节器 - 小王子星球</title>
        <link rel="stylesheet" href="css/fonts.css" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #1a1a2e;
                color: #e0e0e0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                display: flex;
                height: 100vh;
                overflow: hidden;
            }

            /* ===== 左侧控制面板 ===== */
            .control-panel {
                width: 380px;
                min-width: 380px;
                height: 100vh;
                overflow-y: auto;
                background: #16162a;
                border-right: 1px solid #333;
                padding: 16px;
                display: flex;
                flex-direction: column;
            }

            .control-panel h1 {
                font-size: 18px;
                margin-bottom: 4px;
                color: #fdcb6e;
            }
            .control-panel .hint {
                font-size: 12px;
                color: #888;
                margin-bottom: 12px;
                line-height: 1.5;
            }

            .section-header {
                font-size: 14px;
                font-weight: 600;
                color: #a29bfe;
                margin: 12px 0 6px;
                padding: 6px 10px;
                background: rgba(108, 92, 231, 0.15);
                border-radius: 6px;
                cursor: pointer;
                user-select: none;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .section-header::after {
                content: "▼";
                font-size: 10px;
                transition: transform 0.2s;
            }
            .section-header.collapsed::after {
                transform: rotate(-90deg);
            }

            .section-body {
                overflow: hidden;
                transition: max-height 0.3s ease;
            }
            .section-body.collapsed {
                max-height: 0 !important;
            }

            .control-group {
                margin-bottom: 8px;
                padding: 6px 10px;
                background: rgba(255, 255, 255, 0.03);
                border-radius: 8px;
            }
            .control-group label {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 12px;
                color: #bbb;
                margin-bottom: 4px;
            }
            .control-group .value-display {
                font-family: "SF Mono", monospace;
                font-size: 11px;
                color: #fdcb6e;
                background: rgba(253, 203, 110, 0.1);
                padding: 1px 6px;
                border-radius: 4px;
            }
            .control-group.changed {
                border-left: 3px solid #fdcb6e;
            }

            input[type="range"] {
                width: 100%;
                height: 4px;
                -webkit-appearance: none;
                background: #333;
                border-radius: 2px;
                outline: none;
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: #6c5ce7;
                cursor: pointer;
                border: 2px solid #fff;
            }
            input[type="color"] {
                width: 36px;
                height: 24px;
                border: 1px solid #555;
                border-radius: 4px;
                cursor: pointer;
                background: transparent;
                padding: 0;
            }
            .color-control {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .color-control label {
                flex: 1;
                margin: 0;
            }

            /* Screen 切换标签 */
            .screen-tabs {
                display: flex;
                gap: 4px;
                margin-bottom: 12px;
                flex-wrap: wrap;
            }
            .screen-tab {
                padding: 6px 12px;
                font-size: 12px;
                border: 1px solid #444;
                background: transparent;
                color: #aaa;
                border-radius: 6px;
                cursor: pointer;
                transition: all 0.2s;
            }
            .screen-tab.active {
                background: #6c5ce7;
                color: #fff;
                border-color: #6c5ce7;
            }

            /* 底部操作栏 */
            .bottom-bar-panel {
                margin-top: auto;
                padding-top: 12px;
                border-top: 1px solid #333;
                flex-shrink: 0;
            }

            .action-buttons {
                display: flex;
                gap: 8px;
                margin-bottom: 8px;
            }

            .btn-action {
                flex: 1;
                padding: 10px;
                font-size: 13px;
                font-weight: 600;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.2s;
            }
            .btn-save {
                background: #27ae60;
                color: #fff;
            }
            .btn-save:hover {
                background: #219a52;
            }
            .btn-save:disabled {
                background: #333;
                color: #666;
                cursor: not-allowed;
            }
            .btn-reset {
                background: #333;
                color: #ccc;
            }
            .btn-reset:hover {
                background: #444;
            }
            .btn-export {
                background: #2d3436;
                color: #a29bfe;
                border: 1px solid #444;
            }
            .btn-export:hover {
                background: #3d4446;
            }

            .save-status {
                font-size: 11px;
                text-align: center;
                min-height: 18px;
                transition: all 0.3s;
            }
            .save-status.success {
                color: #27ae60;
            }
            .save-status.error {
                color: #e74c3c;
            }
            .save-status.saving {
                color: #fdcb6e;
            }

            /* ===== 右侧预览区 ===== */
            .preview-area {
                flex: 1;
                height: 100vh;
                overflow: hidden;
                position: relative;
                background: #0a0e27;
            }
            .preview-area iframe {
                width: 100%;
                height: 100%;
                border: none;
            }

            .preview-topbar {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 32px;
                background: rgba(0, 0, 0, 0.7);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 12px;
                z-index: 100;
                font-size: 11px;
                color: #888;
            }
            .preview-topbar .changes-count {
                color: #fdcb6e;
            }

            /* ===== 弹窗 ===== */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.7);
                z-index: 1000;
                align-items: center;
                justify-content: center;
            }
            .modal-overlay.show {
                display: flex;
            }
            .modal {
                background: #1e1e3a;
                border: 1px solid #444;
                border-radius: 12px;
                padding: 20px;
                max-width: 600px;
                width: 90%;
                max-height: 80vh;
                overflow-y: auto;
            }
            .modal h3 {
                color: #fdcb6e;
                margin-bottom: 12px;
            }
            .modal pre {
                background: #0d0d1a;
                padding: 16px;
                border-radius: 8px;
                font-size: 12px;
                overflow-x: auto;
                color: #ddd;
                line-height: 1.6;
                white-space: pre-wrap;
            }
            .modal .btn-copy {
                margin-top: 12px;
                padding: 8px 20px;
                background: #6c5ce7;
                color: #fff;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 13px;
            }
            .modal .btn-close {
                margin-top: 8px;
                margin-left: 8px;
                padding: 8px 20px;
                background: #444;
                color: #ccc;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 13px;
            }

            /* 摇杆控制器 */
            .joystick-wrap {
                padding: 8px 10px;
                background: rgba(255,255,255,0.03);
                border-radius: 8px;
                margin-bottom: 8px;
            }
            .joystick-wrap.changed {
                border-left: 3px solid #fdcb6e;
            }
            .joystick-label {
                font-size: 12px;
                color: #bbb;
                margin-bottom: 6px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .joystick-values {
                font-family: 'SF Mono', monospace;
                font-size: 11px;
                color: #fdcb6e;
                background: rgba(253,203,110,0.1);
                padding: 1px 6px;
                border-radius: 4px;
            }
            .joystick-pad {
                position: relative;
                width: 100%;
                height: 180px;
                background:
                    linear-gradient(rgba(108,92,231,0.15) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(108,92,231,0.15) 1px, transparent 1px);
                background-size: 20% 20%;
                border: 1px solid #444;
                border-radius: 8px;
                cursor: crosshair;
                overflow: hidden;
                touch-action: none;
            }
            .joystick-pad::before,
            .joystick-pad::after {
                content: '';
                position: absolute;
                background: rgba(108,92,231,0.3);
                pointer-events: none;
            }
            .joystick-pad::before {
                top: 0; bottom: 0;
                left: 50%; width: 1px;
            }
            .joystick-pad::after {
                left: 0; right: 0;
                top: 50%; height: 1px;
            }
            .joystick-dot {
                position: absolute;
                width: 16px;
                height: 16px;
                border-radius: 50%;
                background: #6c5ce7;
                border: 2px solid #fff;
                box-shadow: 0 0 8px rgba(108,92,231,0.6);
                transform: translate(-50%, -50%);
                pointer-events: none;
                transition: box-shadow 0.15s;
            }
            .joystick-pad.dragging .joystick-dot {
                box-shadow: 0 0 16px rgba(108,92,231,0.9);
                background: #a29bfe;
            }
            .joystick-axis-label {
                position: absolute;
                font-size: 9px;
                color: #666;
                pointer-events: none;
            }
            .joystick-axis-label.left { left: 4px; top: 50%; transform: translateY(-50%); }
            .joystick-axis-label.right { right: 4px; top: 50%; transform: translateY(-50%); }
            .joystick-axis-label.top { top: 4px; left: 50%; transform: translateX(-50%); }
            .joystick-axis-label.bottom { bottom: 4px; left: 50%; transform: translateX(-50%); }

            /* 滚动条 */
            .control-panel::-webkit-scrollbar {
                width: 6px;
            }
            .control-panel::-webkit-scrollbar-track {
                background: transparent;
            }
            .control-panel::-webkit-scrollbar-thumb {
                background: #444;
                border-radius: 3px;
            }
        </style>
    </head>
    <body>
        <div class="control-panel" id="controlPanel">
            <h1>视觉参数调节器</h1>
            <p class="hint">
                拖动滑杆实时预览，满意后点"保存到CSS文件"直接生效。<br />需通过
                <code>node tuner-server.js</code> 启动。
            </p>

            <div class="screen-tabs" id="screenTabs">
                <button class="screen-tab active" data-screen="3">
                    S3 审核
                </button>
                <button class="screen-tab" data-screen="4">S4 邀请</button>
                <button class="screen-tab" data-screen="global">全局</button>
            </div>

            <div id="controlsContainer" style="flex: 1; overflow-y: auto"></div>

            <div class="bottom-bar-panel">
                <div class="action-buttons">
                    <button
                        class="btn-action btn-save"
                        id="btnSave"
                        onclick="saveToFiles()"
                        disabled
                    >
                        保存到CSS文件
                    </button>
                    <button class="btn-action btn-reset" onclick="resetAll()">
                        重置
                    </button>
                </div>
                <div class="action-buttons">
                    <button
                        class="btn-action btn-export"
                        onclick="exportForClaude()"
                    >
                        导出给Claude
                    </button>
                </div>
                <div class="save-status" id="saveStatus"></div>
            </div>
        </div>

        <div class="preview-area">
            <div class="preview-topbar">
                <span>实时预览</span>
                <span class="changes-count" id="changesCount">0 项修改</span>
            </div>
            <iframe id="previewFrame" src="index.html"></iframe>
        </div>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <h3 id="modalTitle">导出</h3>
                <p
                    id="modalDesc"
                    style="font-size: 12px; color: #888; margin-bottom: 12px"
                ></p>
                <pre id="exportContent"></pre>
                <div>
                    <button class="btn-copy" onclick="copyExport()">
                        复制到剪贴板
                    </button>
                    <button class="btn-close" onclick="closeModal()">
                        关闭
                    </button>
                </div>
            </div>
        </div>

        <script>
            // ===== 参数定义 =====
            // 每个控制项多了 file 和 match 字段，用于精确定位 CSS 文件中的原始值进行替换
            const PARAMS = {
                global: {
                    label: "全局样式",
                    groups: [
                        {
                            title: "颜色主题",
                            controls: [
                                {
                                    id: "g-bg-dark",
                                    label: "背景色",
                                    type: "color",
                                    default: "#0a0e27",
                                    css: "--bg-dark",
                                    selector: ":root",
                                },
                                {
                                    id: "g-primary",
                                    label: "主色",
                                    type: "color",
                                    default: "#6c5ce7",
                                    css: "--primary",
                                    selector: ":root",
                                },
                                {
                                    id: "g-primary-light",
                                    label: "主色(亮)",
                                    type: "color",
                                    default: "#a29bfe",
                                    css: "--primary-light",
                                    selector: ":root",
                                },
                                {
                                    id: "g-accent",
                                    label: "强调色",
                                    type: "color",
                                    default: "#fdcb6e",
                                    css: "--accent",
                                    selector: ":root",
                                },
                                {
                                    id: "g-text",
                                    label: "文字色",
                                    type: "color",
                                    default: "#dfe6e9",
                                    css: "--text",
                                    selector: ":root",
                                },
                                {
                                    id: "g-text-dim",
                                    label: "次要文字",
                                    type: "color",
                                    default: "#636e72",
                                    css: "--text-dim",
                                    selector: ":root",
                                },
                            ],
                        },
                        {
                            title: "全局字号",
                            controls: [
                                {
                                    id: "g-body-fontsize",
                                    label: "基础字号",
                                    type: "range",
                                    min: 10,
                                    max: 24,
                                    step: 1,
                                    default: 14,
                                    unit: "px",
                                    css: "font-size",
                                    selector: "html, body",
                                },
                            ],
                        },
                        {
                            title: "按钮",
                            controls: [
                                {
                                    id: "g-btn-padding-v",
                                    label: "按钮上下内距",
                                    type: "range",
                                    min: 4,
                                    max: 20,
                                    step: 1,
                                    default: 10,
                                    unit: "px",
                                    css: "padding-block",
                                    selector: ".btn-primary",
                                },
                                {
                                    id: "g-btn-padding-h",
                                    label: "按钮左右内距",
                                    type: "range",
                                    min: 12,
                                    max: 50,
                                    step: 1,
                                    default: 28,
                                    unit: "px",
                                    css: "padding-inline",
                                    selector: ".btn-primary",
                                },
                                {
                                    id: "g-btn-fontsize",
                                    label: "按钮字号",
                                    type: "range",
                                    min: 12,
                                    max: 24,
                                    step: 1,
                                    default: 16,
                                    unit: "px",
                                    css: "font-size",
                                    selector: ".btn-primary",
                                },
                                {
                                    id: "g-btn-radius",
                                    label: "按钮圆角",
                                    type: "range",
                                    min: 0,
                                    max: 50,
                                    step: 1,
                                    default: 50,
                                    unit: "px",
                                    css: "border-radius",
                                    selector: ".btn-primary",
                                },
                            ],
                        },
                        {
                            title: "输入框",
                            controls: [
                                {
                                    id: "g-input-padding-v",
                                    label: "输入框上下内距",
                                    type: "range",
                                    min: 4,
                                    max: 20,
                                    step: 1,
                                    default: 8,
                                    unit: "px",
                                    css: "padding-block",
                                    selector: ".input-group input",
                                },
                                {
                                    id: "g-input-padding-h",
                                    label: "输入框左右内距",
                                    type: "range",
                                    min: 4,
                                    max: 24,
                                    step: 1,
                                    default: 12,
                                    unit: "px",
                                    css: "padding-inline",
                                    selector: ".input-group input",
                                },
                                {
                                    id: "g-input-fontsize",
                                    label: "输入框字号",
                                    type: "range",
                                    min: 12,
                                    max: 22,
                                    step: 1,
                                    default: 15,
                                    unit: "px",
                                    css: "font-size",
                                    selector: ".input-group input",
                                },
                                {
                                    id: "g-input-radius",
                                    label: "输入框圆角",
                                    type: "range",
                                    min: 0,
                                    max: 24,
                                    step: 1,
                                    default: 12,
                                    unit: "px",
                                    css: "border-radius",
                                    selector: ".input-group input",
                                },
                            ],
                        },
                    ],
                },
                3: {
                    label: "Screen 3: 审核",
                    groups: [
                        {
                            title: "🎬 预览控制 (仅预览不生成CSS)",
                            controls: [
                                {
                                    id: "s3-char",
                                    label: "切换角色 (调图片大小/偏移)",
                                    type: "range",
                                    min: 1,
                                    max: 4,
                                    step: 1,
                                    default: 1,
                                    unit: "",
                                    css: "ignore",
                                    selector: "ignore",
                                },
                            ],
                        },
                        {
                            title: "候选人网格",
                            controls: [
                                {
                                    id: "s3-grid-gap",
                                    label: "卡片间距",
                                    type: "range",
                                    min: 0,
                                    max: 60,
                                    step: 2,
                                    default: 24,
                                    unit: "px",
                                    css: "gap",
                                    selector: ".candidates-grid",
                                },
                                {
                                    id: "s3-grid-top",
                                    label: "网格顶部位置",
                                    type: "range",
                                    min: 0,
                                    max: 20,
                                    step: 1,
                                    default: 8,
                                    unit: "vh",
                                    css: "top",
                                    selector: ".candidates-grid",
                                },
                                {
                                    id: "s3-img-width",
                                    label: "头像区域宽度",
                                    type: "range",
                                    min: 60,
                                    max: 300,
                                    step: 5,
                                    default: 140,
                                    unit: "px",
                                    css: "width",
                                    selector: ".candidate-img-wrap",
                                },
                                {
                                    id: "s3-img-height",
                                    label: "头像区域高度",
                                    type: "range",
                                    min: 80,
                                    max: 400,
                                    step: 5,
                                    default: 200,
                                    unit: "px",
                                    css: "height",
                                    selector: ".candidate-img-wrap",
                                },
                                {
                                    id: "s3-resume-width",
                                    label: "简历卡宽度",
                                    type: "range",
                                    min: 100,
                                    max: 300,
                                    step: 5,
                                    default: 175,
                                    unit: "px",
                                    css: "width",
                                    selector: ".candidate-resume",
                                },
                            ],
                        },
                        {
                            title: "角色图片站位 (按角色独立调)",
                            controls: [
                                {
                                    id: "s3-char-scale",
                                    label: "图片缩放 %",
                                    type: "range",
                                    min: 30,
                                    max: 250,
                                    step: 5,
                                    default: 100,
                                    unit: "%",
                                    css: "transform",
                                    selector: "perchar-card-img",
                                },
                                {
                                    id: "s3-char-offset-y",
                                    label: "垂直偏移 (负=上移)",
                                    type: "range",
                                    min: -150,
                                    max: 150,
                                    step: 2,
                                    default: 0,
                                    unit: "px",
                                    css: "translateY",
                                    selector: "perchar-card-img",
                                },
                            ],
                        },
                        {
                            title: "助手飞行员对话框(底部)",
                            controls: [
                                {
                                    id: "s3-asst-bottom",
                                    label: "距底部",
                                    type: "range",
                                    min: 50,
                                    max: 250,
                                    step: 5,
                                    default: 120,
                                    unit: "px",
                                    css: "bottom",
                                    selector: ".assistant-bar",
                                },
                                {
                                    id: "s3-asst-width",
                                    label: "宽度",
                                    type: "range",
                                    min: 300,
                                    max: 1000,
                                    step: 10,
                                    default: 600,
                                    unit: "px",
                                    css: "width",
                                    selector: ".assistant-bar",
                                },
                                {
                                    id: "s3-asst-padding",
                                    label: "内距",
                                    type: "range",
                                    min: 8,
                                    max: 36,
                                    step: 1,
                                    default: 18,
                                    unit: "px",
                                    css: "padding",
                                    selector: ".assistant-bar",
                                },
                                {
                                    id: "s3-asst-avatar-size",
                                    label: "头像尺寸",
                                    type: "range",
                                    min: 40,
                                    max: 120,
                                    step: 4,
                                    default: 76,
                                    unit: "px",
                                    css: "width|height",
                                    selector: ".assistant-avatar",
                                },
                                {
                                    id: "s3-asst-msg-fontsize",
                                    label: "消息字号",
                                    type: "range",
                                    min: 10,
                                    max: 24,
                                    step: 1,
                                    default: 17,
                                    unit: "px",
                                    css: "font-size",
                                    selector: ".assistant-message",
                                },
                                {
                                    id: "s3-asst-gap",
                                    label: "头像与文字间距",
                                    type: "range",
                                    min: 4,
                                    max: 24,
                                    step: 1,
                                    default: 14,
                                    unit: "px",
                                    css: "gap",
                                    selector: ".assistant-bar",
                                },
                            ],
                        },
                    ],
                },
                4: {
                    label: "Screen 4: 邀请",
                    groups: [
                        {
                            title: "语音卡片",
                            controls: [
                                {
                                    id: "s4-card-gap",
                                    label: "卡片内间距",
                                    type: "range",
                                    min: 16,
                                    max: 80,
                                    step: 2,
                                    default: 44,
                                    unit: "px",
                                    css: "gap",
                                    selector: ".voice-card",

            // ===== 状态 =====
            let currentScreen = "3";
            let changes = {};
            let defaults = {};
            let cssFileCache = {}; // 缓存 CSS 文件内容

            for (const config of Object.values(PARAMS)) {
                for (const group of config.groups) {
                    for (const ctrl of group.controls) {
                        defaults[ctrl.id] = ctrl.default;
                    }
                }
            }

            // ===== 渲染 =====
            function renderControls(screen) {
                const container = document.getElementById("controlsContainer");
                const config = PARAMS[screen];
                if (!config) return;

                let html = "";
                for (const group of config.groups) {
                    const sectionId =
                        `section-${screen}-${group.title}`.replace(
                            /[^a-zA-Z0-9-]/g,
                            "_",
                        );
                    html += `<div class="section-header" onclick="toggleSection('${sectionId}')">${group.title}</div>`;
                    html += `<div class="section-body" id="${sectionId}">`;

                    for (const ctrl of group.controls) {
                        if (ctrl.hidden) continue;

                        const value =
                            changes[ctrl.id] !== undefined
                                ? changes[ctrl.id]
                                : ctrl.default;
                        const isChanged =
                            changes[ctrl.id] !== undefined &&
                            changes[ctrl.id] !== ctrl.default;
                        const changedClass = isChanged ? "changed" : "";

                        if (ctrl.type === "joystick") {
                            const xCtrl = findControl(ctrl.xId);
                            const yCtrl = findControl(ctrl.yId);
                            const xVal = changes[ctrl.xId] !== undefined ? changes[ctrl.xId] : xCtrl.default;
                            const yVal = changes[ctrl.yId] !== undefined ? changes[ctrl.yId] : yCtrl.default;
                            const xChanged = changes[ctrl.xId] !== undefined && changes[ctrl.xId] !== xCtrl.default;
                            const yChanged = changes[ctrl.yId] !== undefined && changes[ctrl.yId] !== yCtrl.default;
                            const jChanged = xChanged || yChanged ? "changed" : "";
                            html += `
          <div class="joystick-wrap ${jChanged}" id="group-${ctrl.id}">
            <div class="joystick-label">
              <span>${ctrl.label}</span>
              <span class="joystick-values" id="val-${ctrl.id}">X:${xVal}${xCtrl.unit} Y:${yVal}${yCtrl.unit}</span>
            </div>
            <div class="joystick-pad" id="pad-${ctrl.id}"
                 data-xid="${ctrl.xId}" data-yid="${ctrl.yId}"
                 data-xmin="${xCtrl.min}" data-xmax="${xCtrl.max}"
                 data-ymin="${yCtrl.min}" data-ymax="${yCtrl.max}"
                 data-xunit="${xCtrl.unit}" data-yunit="${yCtrl.unit}">
              <span class="joystick-axis-label left">左</span>
              <span class="joystick-axis-label right">右</span>
              <span class="joystick-axis-label top">上</span>
              <span class="joystick-axis-label bottom">下</span>
              <div class="joystick-dot" id="dot-${ctrl.id}"></div>
            </div>
          </div>`;
                        } else if (ctrl.type === "color") {
                            html += `
          <div class="control-group color-control ${changedClass}" id="group-${ctrl.id}">
            <label>${ctrl.label}</label>
            <input type="color" id="${ctrl.id}" value="${value}" onchange="onControlChange('${ctrl.id}', this.value)">
          </div>`;
                        } else {
                            const displayVal = ctrl.unit
                                ? `${value}${ctrl.unit}`
                                : value;
                            html += `
          <div class="control-group ${changedClass}" id="group-${ctrl.id}">
            <label>
              <span>${ctrl.label}</span>
              <span class="value-display" id="val-${ctrl.id}">${displayVal}</span>
            </label>
            <input type="range" id="${ctrl.id}" min="${ctrl.min}" max="${ctrl.max}" step="${ctrl.step}" value="${value}"
              oninput="onControlChange('${ctrl.id}', parseFloat(this.value))">
          </div>`;
                        }
                    }
                    html += "</div>";
                }
                container.innerHTML = html;
                initJoysticks();
            }

            // ===== 摇杆控制器 =====
            function initJoysticks() {
                document.querySelectorAll('.joystick-pad').forEach(pad => {
                    const xId = pad.dataset.xid;
                    const yId = pad.dataset.yid;
                    const xMin = parseFloat(pad.dataset.xmin);
                    const xMax = parseFloat(pad.dataset.xmax);
                    const yMin = parseFloat(pad.dataset.ymin);
                    const yMax = parseFloat(pad.dataset.ymax);
                    const xUnit = pad.dataset.xunit;
                    const yUnit = pad.dataset.yunit;
                    const dot = pad.querySelector('.joystick-dot');
                    const padId = pad.id.replace('pad-', '');

                    // 初始化圆点位置
                    const xCtrl = findControl(xId);
                    const yCtrl = findControl(yId);
                    const xVal = changes[xId] !== undefined ? changes[xId] : xCtrl.default;
                    const yVal = changes[yId] !== undefined ? changes[yId] : yCtrl.default;
                    positionDot(dot, pad, xVal, xMin, xMax, yVal, yMin, yMax);

                    let dragging = false;

                    const xStep = findControl(xId).step || 1;
                    const yStep = findControl(yId).step || 1;

                    function snapTo(val, step) {
                        return Math.round(val / step) * step;
                    }

                    function onMove(clientX, clientY) {
                        const rect = pad.getBoundingClientRect();
                        const px = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                        const py = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));

                        const xNew = snapTo(xMin + px * (xMax - xMin), xStep);
                        const yNew = snapTo(yMax - py * (yMax - yMin), yStep); // Y轴反转：上=大值(bottom大=高)

                        dot.style.left = (px * 100) + '%';
                        dot.style.top = (py * 100) + '%';

                        onControlChange(xId, xNew);
                        onControlChange(yId, yNew);

                        const valEl = document.getElementById('val-' + padId);
                        if (valEl) valEl.textContent = `X:${xNew}${xUnit} Y:${yNew}${yUnit}`;
                    }

                    pad.addEventListener('pointerdown', (e) => {
                        dragging = true;
                        pad.classList.add('dragging');
                        pad.setPointerCapture(e.pointerId);
                        onMove(e.clientX, e.clientY);
                    });
                    pad.addEventListener('pointermove', (e) => {
                        if (!dragging) return;
                        onMove(e.clientX, e.clientY);
                    });
                    pad.addEventListener('pointerup', () => {
                        dragging = false;
                        pad.classList.remove('dragging');
                    });
                    pad.addEventListener('pointercancel', () => {
                        dragging = false;
                        pad.classList.remove('dragging');
                    });
                });
            }

            function positionDot(dot, pad, xVal, xMin, xMax, yVal, yMin, yMax) {
                const px = (xVal - xMin) / (xMax - xMin);
                const py = 1 - (yVal - yMin) / (yMax - yMin); // Y轴反转
                dot.style.left = (px * 100) + '%';
                dot.style.top = (py * 100) + '%';
            }

            function toggleSection(id) {
                const body = document.getElementById(id);
                const header = body.previousElementSibling;
                body.classList.toggle("collapsed");
                header.classList.toggle("collapsed");
            }

            // ===== 控制变更 =====
            function onControlChange(id, value) {
                changes[id] = value;

                const ctrl = findControl(id);
                if (ctrl && ctrl.type === "range") {
                    const valEl = document.getElementById(`val-${id}`);
                    if (id === "s3-char" && valEl) {
                        const charLabels = [
                            "",
                            "1. 玫瑰",
                            "2. 国王",
                            "3. 爱慕虚荣的人",
                            "4. 商人",
                        ];
                        valEl.textContent = charLabels[value];
                    } else if (valEl) {
                        valEl.textContent = ctrl.unit
                            ? `${value}${ctrl.unit}`
                            : value;
                    }
                }

                // 高亮已修改项
                const group = document.getElementById(`group-${id}`);
                if (group) {
                    if (value !== defaults[id]) group.classList.add("changed");
                    else group.classList.remove("changed");
                }

                // 进度控制器只控制显隐，不生成 CSS
                if (id === "s3-char") {
                    updateS3Character(value);
                    return;
                }

                // 角色图片样式是每角色独立存储
                if (id === "s3-char-scale" || id === "s3-char-offset-y") {
                    const charId = _currentCharId();
                    if (id === "s3-char-scale") _charCardStyles[charId].scale = value;
                    if (id === "s3-char-offset-y") _charCardStyles[charId].offsetY = value;
                }

                applyToPreview();
                updateChangesCount();
            }

            function findControl(id) {
                for (const config of Object.values(PARAMS)) {
                    for (const group of config.groups) {
                        for (const ctrl of group.controls) {
                            if (ctrl.id === id) return ctrl;
                        }
                    }
                }
                return null;
            }

            function applyToPreview() {
                const iframe = document.getElementById("previewFrame");
                const doc = iframe.contentDocument;
                if (!doc) return;

                // 查找或创建动态样式标签
                let styleEl = doc.getElementById("tuner-dynamic-styles");
                if (!styleEl) {
                    styleEl = doc.createElement("style");
                    styleEl.id = "tuner-dynamic-styles";
                    doc.head.appendChild(styleEl);
                }

                // 遍历所有有改动的参数，生成 CSS 文本
                const changedParams = Object.entries(changes).filter(
                    ([id, val]) => val !== defaults[id],
                );
                const selectorMap = {};

                for (const [id, val] of changedParams) {
                    const ctrl = findControl(id);
                    if (!ctrl || ctrl.css === "ignore") continue;
                    // perchar-card-img 控件在下方单独处理
                    if (ctrl.selector === "perchar-card-img") continue;

                    const props = ctrl.css.split("|");
                    let cssValue = ctrl.cssFunc
                        ? ctrl.cssFunc(val)
                        : ctrl.type === "color"
                          ? val
                          : ctrl.unit
                            ? `${val}${ctrl.unit}`
                            : `${val}`;

                    if (!selectorMap[ctrl.selector])
                        selectorMap[ctrl.selector] = [];
                    for (const prop of props) {
                        selectorMap[ctrl.selector].push(
                            `  ${prop}: ${cssValue} !important;`,
                        );
                    }
                }

                // 生成每个角色独立的卡片图片 CSS（scale + translateY 合并到 transform）
                for (const [charId, style] of Object.entries(_charCardStyles)) {
                    const hasChange = style.scale !== 100 || style.offsetY !== 0;
                    if (!hasChange) continue;
                    const sel = `.candidate-card[data-char-id="${charId}"] .candidate-img-wrap img`;
                    const parts = [];
                    if (style.scale !== 100) parts.push(`scale(${style.scale / 100})`);
                    if (style.offsetY !== 0) parts.push(`translateY(${style.offsetY}px)`);
                    selectorMap[sel] = [
                        `  transform: ${parts.join(' ')} !important;`,
                        `  transform-origin: bottom center !important;`,
                    ];
                }

                // 拼接 CSS 字符串
                let cssText = "";
                for (const [selector, declarations] of Object.entries(
                    selectorMap,
                )) {
                    cssText += `${selector} {\n${declarations.join("\n")}\n}\n`;
                }

                // 统一写入，浏览器会自动重新渲染
                styleEl.textContent = cssText;
            }

            // ===== S3 角色卡片站位 =====
            const S3_CHAR_IDS = ['rose', 'king', 'vain', 'merchant'];
            const S3_CHAR_NAMES = { rose: '玫瑰', king: '国王', vain: '爱慕虚荣的人', merchant: '商人' };
            const S3_CHAR_IMAGES = {
                rose: 'assets/images/characters/rose-desk.png',
                king: 'assets/images/characters/king.png',
                vain: 'assets/images/characters/vain.png',
                merchant: 'assets/images/characters/merchant.png',
            };

            let _s3CurrentChar = 1;

            // 每个角色独立的图片样式 { rose: {scale:100, offsetY:0}, ... }
            // scale: 百分比，100=原始大小
            const _charCardStyles = {
                rose:     { scale: 100, offsetY: 0 },
                king:     { scale: 100, offsetY: 0 },
                vain:     { scale: 100, offsetY: 0 },
                merchant: { scale: 100, offsetY: 0 },
            };

            function _currentCharId() {
                return S3_CHAR_IDS[_s3CurrentChar - 1] || 'rose';
            }

            function updateS3Character(index) {
                _s3CurrentChar = index;
                const charId = _currentCharId();
                const style = _charCardStyles[charId];

                // 加载该角色的图片样式到控制器
                changes['s3-char-scale'] = style.scale;
                changes['s3-char-offset-y'] = style.offsetY;

                // 更新滑杆显示
                const sInput = document.getElementById('s3-char-scale');
                const oInput = document.getElementById('s3-char-offset-y');
                if (sInput) { sInput.value = style.scale; const ve = document.getElementById('val-s3-char-scale'); if (ve) ve.textContent = style.scale + '%'; }
                if (oInput) { oInput.value = style.offsetY; const ve = document.getElementById('val-s3-char-offset-y'); if (ve) ve.textContent = style.offsetY + 'px'; }

                _renderS3Preview();
                applyToPreview();
            }

            function _renderS3Preview() {
                const doc = document.getElementById("previewFrame").contentDocument;
                if (!doc) return;

                // 确保 candidates-grid 可见并填充卡片
                const grid = doc.getElementById('candidates-grid');
                if (!grid) return;

                // 如果网格还没有子元素，手动填充
                if (grid.children.length === 0) {
                    grid.style.display = '';
                    grid.style.opacity = '1';
                    S3_CHAR_IDS.forEach(charId => {
                        const card = doc.createElement('div');
                        card.className = 'candidate-card';
                        card.dataset.charId = charId;
                        card.style.opacity = '1';
                        card.innerHTML = `
                            <div class="candidate-img-wrap">
                                <img src="${S3_CHAR_IMAGES[charId]}" alt="${S3_CHAR_NAMES[charId]}">
                            </div>
                            <div class="candidate-resume">
                                <div class="resume-header">
                                    <span class="resume-title">📋 移民申请档案</span>
                                </div>
                                <div class="resume-body">

                                    </div>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }

                // 高亮当前选中的角色卡
                const charId = _currentCharId();
                grid.querySelectorAll('.candidate-card').forEach(card => {
                    if (card.dataset.charId === charId) {
                        card.style.outline = '3px solid #fdcb6e';
                        card.style.outlineOffset = '4px';

                        card.style.outline = '';
                        card.style.outlineOffset = '';

            }

            // ===== Screen 切换 =====
            document
                .getElementById("screenTabs")
                .addEventListener("click", (e) => {
                    if (!e.target.classList.contains("screen-tab")) return;
                    document
                        .querySelectorAll(".screen-tab")
                        .forEach((t) => t.classList.remove("active"));
                    e.target.classList.add("active");
                    currentScreen = e.target.dataset.screen;
                    renderControls(currentScreen);
                    if (["1", "2", "3", "4"].includes(currentScreen))
                        switchPreviewScreen(currentScreen);
                });

            function switchPreviewScreen(num) {
                const doc =
                    document.getElementById("previewFrame").contentDocument;
                if (!doc) return;

                // 0. 隐藏 start-overlay（它 z-index 200 会挡住一切）
                const startOverlay = doc.getElementById("start-overlay");
                if (startOverlay) startOverlay.style.setProperty("display", "none", "important");

                // 1. 先把所有屏幕隐藏
                doc.querySelectorAll(".screen").forEach((s) => {
                    s.classList.remove("active");
                    s.style.display = "none";
                });

                // 2. 显示目标屏幕
                const target = doc.getElementById(`screen-${num}`);
                if (target) {
                    target.classList.add("active");
                    target.style.display = "flex";

                    // 全局扫雷：抹除当前屏幕下所有内联 display:none
                    target
                        .querySelectorAll(
                            '[style*="display: none"], [style*="display:none"]',
                        )
                        .forEach((el) => {
                            el.style.setProperty("display", "", "important");
                        });

                    // ===== S3 审核 =====
                    if (num === "3") {
                        // 填充候选人网格并高亮当前选中角色
                        _renderS3Preview();
                        applyToPreview();
                    }

                    // ===== S4 邀请 =====
                    if (num === "4") {
                        // 关掉语音遮罩
                        const voiceOverlay = doc.getElementById("voiceOverlay");
                        if (voiceOverlay) {
                            voiceOverlay.style.setProperty(
                                "display",
                                "none",
                                "important",
                            );
                            voiceOverlay.style.setProperty(
                                "opacity",
                                "0",
                                "important",
                            );
                        }

                        // 强行点亮 S4 主内容区
                        const s4Main = doc.getElementById("s4MainContent");
                        if (s4Main) {
                            s4Main.style.setProperty(
                                "display",
                                "block",
                                "important",
                            );
                            s4Main.style.setProperty(
                                "opacity",
                                "1",
                                "important",
                            );
                            s4Main.style.setProperty(
                                "visibility",
                                "visible",
                                "important",
                            );
                        }

                        // 显示底部大按钮
                        const btn = doc.getElementById("btn-to-panorama");
                        if (btn)
                            btn.style.setProperty(
                                "display",
                                "block",
                                "important",
                            );
                    }
                }
            }

            // ===== 保存到 CSS 文件（通过服务器 API） =====
            async function saveToFiles() {
                const changedParams = Object.entries(changes).filter(
                    ([id, val]) => val !== defaults[id],
                );
                if (changedParams.length === 0) {
                    showStatus("没有修改", "error");
                    return;
                }

                showStatus("正在保存...", "saving");

                try {
                    // 先读取最新 CSS 文件内容
                    const resp = await fetch("/api/css");
                    if (!resp.ok)
                        throw new Error(
                            "无法读取CSS文件，确保通过 node tuner-server.js 启动",
                        );
                    cssFileCache = await resp.json();

                    // 对每个 CSS 文件做修改
                    const fileChanges = {}; // { 'css/style.css': content }

                    for (const [file, content] of Object.entries(
                        cssFileCache,
                    )) {
                        fileChanges[file] = content;
                    }

                    const marker = "/* === 调参器生成的覆盖样式 (tuner) === */";
                    const targetFile = "css/screens.css";
                    let content = fileChanges[targetFile];

                    // 1. 解析已有覆盖块中的规则（保留之前保存的修改）
                    const existingMap = {}; // { selector: { prop: "value !important" } }
                    const markerIdx = content.indexOf(marker);
                    if (markerIdx !== -1) {
                        const oldBlock = content.substring(
                            markerIdx + marker.length,
                        );
                        // 简单解析：匹配 selector { ... } 块
                        const ruleRe = /([^{]+)\{([^}]+)\}/g;
                        let m;
                        while ((m = ruleRe.exec(oldBlock)) !== null) {
                            const sel = m[1].trim();
                            const body = m[2].trim();
                            if (!existingMap[sel]) existingMap[sel] = {};
                            // 解析每条声明
                            body.split(";").forEach((decl) => {
                                const colonIdx = decl.indexOf(":");
                                if (colonIdx === -1) return;
                                const prop = decl.substring(0, colonIdx).trim();
                                const val = decl.substring(colonIdx + 1).trim();
                                if (prop && val) existingMap[sel][prop] = val;
                            });
                        }
                        // 清除旧覆盖块
                        content =
                            content.substring(0, markerIdx).trimEnd() + "\n";
                    }

                    // 2. 用当前 changes 覆盖/合并到 existingMap
                    let hasOverrides = Object.keys(existingMap).length > 0;

                    for (const [id, val] of changedParams) {
                        const ctrl = findControl(id);
                        if (!ctrl || ctrl.css === "ignore") continue;
                        // perchar-card-img 控件在下方单独处理
                        if (ctrl.selector === "perchar-card-img") continue;

                        const props = ctrl.css.split("|");
                        let cssValue;
                        if (ctrl.cssFunc) {
                            cssValue = ctrl.cssFunc(val);
                        } else if (ctrl.type === "color") {
                            cssValue = val;
                        } else {
                            cssValue = ctrl.unit
                                ? `${val}${ctrl.unit}`
                                : `${val}`;
                        }

                        if (!existingMap[ctrl.selector])
                            existingMap[ctrl.selector] = {};
                        for (const prop of props) {
                            existingMap[ctrl.selector][prop] =
                                `${cssValue} !important`;
                        }
                        hasOverrides = true;
                    }

                    // 写入每个角色独立的卡片图片样式（scale + translateY 合并到 transform）
                    for (const [charId, style] of Object.entries(_charCardStyles)) {
                        const hasChange = style.scale !== 100 || style.offsetY !== 0;
                        if (!hasChange) continue;
                        const sel = `.candidate-card[data-char-id="${charId}"] .candidate-img-wrap img`;
                        if (!existingMap[sel]) existingMap[sel] = {};
                        const parts = [];
                        if (style.scale !== 100) parts.push(`scale(${style.scale / 100})`);
                        if (style.offsetY !== 0) parts.push(`translateY(${style.offsetY}px)`);
                        existingMap[sel]['transform'] = `${parts.join(' ')} !important`;
                        existingMap[sel]['transform-origin'] = `bottom center !important`;
                        hasOverrides = true;
                    }

                    if (!hasOverrides) {
                        showStatus("没有有效修改", "error");
                        return;
                    }

                    // 3. 生成新的覆盖块
                    let overrideBlock =
                        "\n/* === 调参器生成的覆盖样式 (tuner) === */\n";
                    for (const [selector, declMap] of Object.entries(
                        existingMap,
                    )) {
                        const declarations = Object.entries(declMap)
                            .map(([p, v]) => `  ${p}: ${v};`)
                            .join("\n");
                        overrideBlock += `${selector} {\n${declarations}\n}\n\n`;
                    }

                    // 同时清除 style.css 中可能残留的旧覆盖块
                    let styleContent = fileChanges["css/style.css"];
                    const styleMarkerIdx = styleContent.indexOf(marker);
                    if (styleMarkerIdx !== -1) {
                        styleContent =
                            styleContent
                                .substring(0, styleMarkerIdx)
                                .trimEnd() + "\n";
                        fileChanges["css/style.css"] = styleContent;
                        const cleanResp = await fetch("/api/css", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                file: "css/style.css",
                                content: styleContent,
                            }),
                        });
                    }

                    content += overrideBlock;
                    fileChanges[targetFile] = content;

                    // 写回文件
                    const writeResp = await fetch("/api/css", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            file: targetFile,
                            content: fileChanges[targetFile],
                        }),
                    });

                    if (!writeResp.ok) throw new Error("写入失败");

                    const result = await writeResp.json();
                    if (result.ok) {
                        showStatus("已保存！刷新预览中...", "success");
                        // 刷新 iframe 以加载新 CSS
                        setTimeout(() => {
                            document
                                .getElementById("previewFrame")
                                .contentWindow.location.reload();
                        }, 500);
                    } else {
                        throw new Error("写入返回错误");
                    }
                } catch (e) {
                    showStatus(`保存失败: ${e.message}`, "error");
                }
            }

            function showStatus(msg, type) {
                const el = document.getElementById("saveStatus");
                el.textContent = msg;
                el.className = `save-status ${type}`;
                if (type === "success")
                    setTimeout(() => (el.textContent = ""), 3000);
            }

            function updateChangesCount() {
                let count = Object.entries(changes).filter(
                    ([id, val]) => {
                        const ctrl = findControl(id);
                        // perchar-card-img 控件不算在普通计数里
                        if (ctrl && ctrl.selector === "perchar-card-img") return false;
                        return val !== defaults[id];
                    },
                ).length;
                // 计算角色卡片图片样式变更数
                for (const [charId, style] of Object.entries(_charCardStyles)) {
                    if (style.scale !== 100 || style.offsetY !== 0) count++;
                }
                document.getElementById("changesCount").textContent =
                    `${count} 项修改`;
                document.getElementById("btnSave").disabled = count === 0;
            }

            // ===== 导出给 Claude =====
            function exportForClaude() {
                const changedParams = Object.entries(changes).filter(
                    ([id, val]) => val !== defaults[id],
                );
                if (changedParams.length === 0) {
                    alert("没有修改任何参数");
                    return;
                }

                let output = "请帮我按以下参数修改CSS样式：\n\n";
                const grouped = {};
                for (const [id, val] of changedParams) {
                    const ctrl = findControl(id);
                    if (!ctrl || ctrl.css === "ignore") continue;
                    if (ctrl.selector === "perchar-card-img") continue;
                    const screenKey = id.startsWith("g-")
                        ? "全局"
                        : `Screen ${id.charAt(1)}`;
                    if (!grouped[screenKey]) grouped[screenKey] = [];
                    const props = ctrl.css.split("|");
                    let cssValue = ctrl.cssFunc
                        ? ctrl.cssFunc(val)
                        : ctrl.type === "color"
                          ? val
                          : ctrl.unit
                            ? `${val}${ctrl.unit}`
                            : `${val}`;
                    grouped[screenKey].push({
                        label: ctrl.label,
                        selector: ctrl.selector,
                        properties: props.map((p) => `${p}: ${cssValue}`),
                        oldValue: ctrl.unit
                            ? `${defaults[id]}${ctrl.unit}`
                            : defaults[id],
                        newValue: cssValue,
                    });
                }
                // 角色独立卡片图片样式
                for (const [charId, style] of Object.entries(_charCardStyles)) {
                    if (style.scale !== 100 || style.offsetY !== 0) {
                        if (!grouped['Screen 3']) grouped['Screen 3'] = [];
                        const parts = [];
                        if (style.scale !== 100) parts.push(`scale(${style.scale / 100})`);
                        if (style.offsetY !== 0) parts.push(`translateY(${style.offsetY}px)`);
                        grouped['Screen 3'].push({
                            label: `${S3_CHAR_NAMES[charId]}图片样式`,
                            selector: `.candidate-card[data-char-id="${charId}"] .candidate-img-wrap img`,
                            properties: [`transform: ${parts.join(' ')}`],
                            oldValue: 'scale:100%',
                            newValue: `transform: ${parts.join(' ')}`,
                        });
                    }
                }
                for (const [screen, items] of Object.entries(grouped)) {
                    output += `【${screen}】\n`;
                    for (const item of items) {
                        output += `  ${item.label}: ${item.oldValue} -> ${item.newValue}\n`;
                        output += `    选择器: ${item.selector}\n`;
                        output += `    CSS: ${item.properties.join("; ")}\n`;
                    }
                    output += "\n";
                }

                document.getElementById("modalTitle").textContent =
                    "导出给Claude";
                document.getElementById("modalDesc").textContent =
                    "复制以下内容发给 Claude，让它精准修改 CSS 源文件（会替换 clamp/vh 等响应式写法）：";
                document.getElementById("exportContent").textContent = output;
                document.getElementById("modalOverlay").classList.add("show");
            }

            function copyExport() {
                const text =
                    document.getElementById("exportContent").textContent;
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.querySelector(".btn-copy");
                    btn.textContent = "已复制!";
                    setTimeout(() => (btn.textContent = "复制到剪贴板"), 2000);
                });
            }
            function closeModal() {
                document
                    .getElementById("modalOverlay")
                    .classList.remove("show");
            }

            function resetAll() {
                if (!confirm("确定重置所有修改？")) return;
                changes = {};
                // 重置角色卡片图片样式到默认值
                for (const charId of Object.keys(_charCardStyles)) {
                    _charCardStyles[charId] = { scale: 100, offsetY: 0 };
                }
                document
                    .getElementById("previewFrame")
                    .contentWindow.location.reload();
                renderControls(currentScreen);
                updateChangesCount();
                showStatus("", "");
            }

            // ===== 从 CSS 覆盖块读取已保存的角色卡片样式 =====
            async function loadCharStylesFromCSS() {
                try {
                    const resp = await fetch("/api/css");
                    if (!resp.ok) return;
                    const files = await resp.json();
                    const css = files["css/screens.css"] || "";
                    const marker = "/* === 调参器生成的覆盖样式 (tuner) === */";
                    const idx = css.indexOf(marker);
                    if (idx === -1) return;
                    const block = css.substring(idx);
                    // 匹配 .candidate-card[data-char-id="xxx"] .candidate-img-wrap img { ... }
                    const re = /\.candidate-card\[data-char-id="(\w+)"\]\s*\.candidate-img-wrap\s*img\s*\{([^}]+)\}/g;
                    let m;
                    while ((m = re.exec(block)) !== null) {
                        const charId = m[1];
                        const body = m[2];
                        if (!_charCardStyles[charId]) continue;
                        const sm = body.match(/scale\(([\d.]+)\)/);
                        const tm = body.match(/translateY\((-?[\d.]+)px\)/);
                        if (sm) _charCardStyles[charId].scale = Math.round(parseFloat(sm[1]) * 100);
                        if (tm) _charCardStyles[charId].offsetY = parseFloat(tm[1]);
                    }
                } catch(e) { /* tuner-server 可能没启动 */ }
            }

            // ===== iframe 加载完毕后重新应用修改 =====
            document
                .getElementById("previewFrame")
                .addEventListener("load", () => {
                    applyToPreview();
                    if (["1", "2", "3", "4"].includes(currentScreen))
                        switchPreviewScreen(currentScreen);
                });

            // 初始化
            loadCharStylesFromCSS().then(() => {
                renderControls(currentScreen);
            });
        </script>
    </body>
</html>
